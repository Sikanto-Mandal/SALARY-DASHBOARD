                  <!-- Cards Section -->
<section class="cards">

  <!-- Card 1 -->
  <div class="card">

    <div class="card-left">

      <div class="icon-box blue-bg">
        <i class="fa-solid fa-wallet"></i>
      </div>

      <div class="card-text">
        <p>Monthly Salary</p>
        <h2>₹ 42,580</h2>
        

        <span class="green-text">
          ↑ 12.5%
          <small>from last month</small>
        </span>
      </div>

    </div>

    <div class="wave green-wave"><i class="fa-solid fa-arrow-trend-up"></i></div>

  </div>

  <!-- Card 2 -->
  <div class="card">

    <div class="card-left">

      <div class="icon-box green-bg">
        <i class="fa-solid fa-calendar-check"></i>
      </div>

      <div class="card-text">
        <p>Present Days</p>
        <h2>26</h2>

        <span class="green-text">
          ↑ 8.3%
          <small>from last month</small>
        </span>
      </div>

    </div>

    <div class="wave green-wave">
        <i class="fa-solid fa-arrow-trend-up"></i>
    </div>

  </div>

  <!-- Card 3 -->
  <div class="card">

    <div class="card-left">

      <div class="icon-box red-bg">
        <i class="fa-solid fa-clock"></i>
      </div>

      <div class="card-text">
        <p>Late Days</p>
        <h2>02</h2>

        <span class="red-text">
          ↓ 33.3%
          <small>from last month</small>
        </span>
      </div>

    </div>

    <div class="wave red-wave"><i class="fa-solid fa-arrow-trend-down"></i></div>

  </div>

  <!-- Card 4 -->
  <div class="card">

    <div class="card-left">

      <div class="icon-box purple-bg">
        <i class="fa-regular fa-star"></i>
      </div>

      <div class="card-text">
        <p>Total Points</p>
        <h2>31.82</h2>

        <span class="green-text">
          ↑ 11.7%
          <small>from last month</small>
        </span>
      </div>

    </div>

    <div class="wave purple-wave">
        <i class="fa-solid fa-arrow-trend-up purple"></i>
    </div>

  </div>

</section>


        </div>
